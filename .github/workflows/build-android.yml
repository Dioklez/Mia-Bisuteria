name: Build Android APK

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 --decode > android/keystore.jks

      - name: Verify keystore
        run: keytool -list -keystore android/keystore.jks -storepass "${{ secrets.ANDROID_STORE_PASS }}" -alias "${{ secrets.ANDROID_KEY_ALIAS }}" -noprompt

      - name: Check SDK path
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          cat android/local.properties

      - name: List Gradle tasks
        working-directory: android
        run: ./gradlew tasks --all 2>&1 | grep -i "assemble\|release\|debug" || echo "No assembly tasks found - plugin not loading"

      - name: Build debug APK (sanity check)
        working-directory: android
        run: ./gradlew :app:assembleDebug

      - name: Check debug APK exists
        run: |
          find android/app/build -name "*.apk" || echo "No APKs - el proyecto no compila"

      - name: Build release APK
        working-directory: android
        run: ./gradlew :app:assembleRelease --stacktrace
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/android/keystore.jks
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASS }}
          STORE_PASS: ${{ secrets.ANDROID_STORE_PASS }}

      - name: Find and rename APK
        run: |
          APK=$(find . -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK encontrado en ninguna ruta"
            exit 1
          fi
          echo "APK encontrado: $APK"
          mkdir -p android/app/build/outputs/apk/release/
          cp "$APK" "android/app/build/outputs/apk/release/MiaBisuteriaAdmin-${{ github.ref_name }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/MiaBisuteriaAdmin-*.apk
          generate_release_notes: true
          name: "Mía Admin ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up secrets
        if: always()
        run: |
          rm -f android/keystore.jks
          rm -f android/app/google-services.json
