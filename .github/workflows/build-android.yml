name: Build Android APK

on:
  push:
    tags:
      - 'v*.*.*'          # Trigger on version tags like v1.0.0
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Decode keystore from secret
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 --decode > android/keystore.jks
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/android/keystore.jks
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASS }}
          STORE_PASS: ${{ secrets.ANDROID_STORE_PASS }}

      - name: Rename APK with version
        run: |
          VERSION="${{ github.ref_name }}"
          APK=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -1)
          echo "APK encontrado: $APK"
          cp "$APK" android/app/build/outputs/apk/release/MiaBisuteriaAdmin-${VERSION}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/MiaBisuteriaAdmin-*.apk
          generate_release_notes: true
          name: "Mía Admin ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up keystore
        if: always()
        run: rm -f android/keystore.jks
