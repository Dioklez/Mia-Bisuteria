<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Error en el pago — Mía Bisutería</title>
  <meta name="robots" content="noindex"/>
  <meta name="theme-color" content="#1e2d08"/>
  <link rel="icon" href="images/logos/flor-verde.jpg" type="image/png"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Jost:wght@300;400;500&family=Dancing+Script:wght@700&display=swap" rel="stylesheet"/>
  <style>
    :root { --v:#1e2d08; --c:#f9f4ec; --cborde:#d8c9aa; --txt2:#5a4228; --fn:'Playfair Display',serif; --fb:'Jost',sans-serif; --fl:'Dancing Script',cursive; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:var(--fb); background:var(--c); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .card { background:#fff; border-radius:24px; padding:40px 32px; max-width:420px; width:100%; text-align:center; box-shadow:0 8px 40px rgba(0,0,0,.08); border:1px solid var(--cborde); }
    .icono { font-size:3.5rem; margin-bottom:16px; }
    .logo { font-family:var(--fl); font-size:1.5rem; color:var(--v); margin-bottom:24px; }
    h1 { font-family:var(--fn); font-size:1.5rem; color:#c62828; margin-bottom:10px; }
    p { font-size:.88rem; color:var(--txt2); line-height:1.7; margin-bottom:24px; }
    .btns { display:flex; flex-direction:column; gap:10px; }
    .btn { display:flex; align-items:center; justify-content:center; gap:8px; padding:13px 28px; border-radius:12px; font-size:.88rem; font-weight:500; text-decoration:none; transition:.3s; }
    .btn-p { background:var(--v); color:#fff; }
    .btn-p:hover { background:#2e440f; }
    .btn-wa { background:#25a35a; color:#fff; }
    .btn-wa:hover { background:#1a7d42; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Mía Bisutería</div>
    <div class="icono">❌</div>
    <h1>No pudimos procesar el pago</h1>
    <p>Puede ser un problema con los datos de la tarjeta o fondos insuficientes. Podés intentarlo de nuevo o consultarnos por WhatsApp.</p>
    <div class="btns">
      <a href="javascript:history.back()" class="btn btn-p">Intentar de nuevo</a>
      <a href="https://wa.me/5491137742189?text=Hola%20M%C3%ADa%2C%20tuve%20un%20problema%20con%20el%20pago%20de%20mi%20pedido" class="btn btn-wa">Consultar por WhatsApp</a>
    </div>
  </div>
</body>
</html>
