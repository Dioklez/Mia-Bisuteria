<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pago confirmado — Mía Bisutería</title>
  <meta name="robots" content="noindex"/>
  <meta name="theme-color" content="#1e2d08"/>
  <link rel="icon" href="images/logos/flor-verde.jpg" type="image/png"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Jost:wght@300;400;500&family=Dancing+Script:wght@700&display=swap" rel="stylesheet"/>
  <style>
    :root { --v:#1e2d08; --v3:#4a6b22; --vmenta:#c8deb0; --vfondo:#e8f0d8; --c:#f9f4ec; --cborde:#d8c9aa; --txt:#1c1408; --txt2:#5a4228; --txt3:#8a7060; --fn:'Playfair Display',serif; --fb:'Jost',sans-serif; --fl:'Dancing Script',cursive; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:var(--fb); background:var(--c); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .card { background:#fff; border-radius:24px; padding:40px 32px; max-width:420px; width:100%; text-align:center; box-shadow:0 8px 40px rgba(0,0,0,.08); border:1px solid var(--cborde); }
    .icono { font-size:3.5rem; margin-bottom:16px; }
    .logo { font-family:var(--fl); font-size:1.5rem; color:var(--v); margin-bottom:24px; }
    h1 { font-family:var(--fn); font-size:1.6rem; color:var(--v3); margin-bottom:10px; }
    p { font-size:.88rem; color:var(--txt2); line-height:1.7; margin-bottom:24px; }
    .btn { display:inline-flex; align-items:center; gap:8px; padding:13px 28px; background:var(--v); color:#fff; border-radius:12px; text-decoration:none; font-size:.9rem; font-weight:500; transition:.3s; }
    .btn:hover { background:#2e440f; }
    .confetti { position:fixed; inset:0; pointer-events:none; overflow:hidden; }
    .c { position:absolute; width:10px; height:10px; border-radius:2px; animation:caer 3s ease-in forwards; }
    @keyframes caer { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }
  </style>
</head>
<body>
  <div class="confetti" id="confetti"></div>
  <div class="card">
    <div class="logo">Mía Bisutería</div>
    <div class="icono">✅</div>
    <h1>¡Pago confirmado!</h1>
    <p>Tu pedido fue registrado exitosamente. Mía va a ponerse en contacto con vos para coordinar la entrega. ¡Gracias por elegirnos!</p>
    <a href="catalogo.html" class="btn">Ver más piezas</a>
  </div>
  <script>
    const colors = ['#4a6b22','#b8862e','#c8deb0','#f0d898','#1e2d08'];
    const c = document.getElementById('confetti');
    for (let i = 0; i < 60; i++) {
      const el = document.createElement('div');
      el.className = 'c';
      el.style.cssText = `left:${Math.random()*100}%;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;animation-delay:${Math.random()*2}s;animation-duration:${2+Math.random()*2}s`;
      c.appendChild(el);
    }
  </script>
</body>
</html>
